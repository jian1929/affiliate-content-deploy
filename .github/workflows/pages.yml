name: Deploy Static Files

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        run: |
          mkdir -p _site
          # List files for debugging
          ls -la
          # Copy all files to _site
          find . -name "*.html" -o -name "*.xml" -o -name "*.txt" -o -name "*.json" | grep -v ".github" | xargs -I {} cp --parents {} _site/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
